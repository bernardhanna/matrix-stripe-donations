name: Matrix Donations E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Optional base URL override'
        required: false
        default: ''
      site_password:
        description: 'Optional site password override'
        required: false
        default: ''
  push:
    paths:
      - 'wp-content/plugins/matrix-donations/**'
  pull_request:
    paths:
      - 'wp-content/plugins/matrix-donations/**'
  schedule:
    - cron: '0 7 * * *'

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wp-content/plugins/matrix-donations
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wp-content/plugins/matrix-donations/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate test discovery
        run: npm run test:e2e -- --list

      - name: Run e2e suite
        if: ${{ github.event.inputs.base_url != '' || secrets.MATRIX_DONATIONS_BASE_URL != '' }}
        env:
          MATRIX_DONATIONS_BASE_URL: ${{ github.event.inputs.base_url || secrets.MATRIX_DONATIONS_BASE_URL }}
          MATRIX_DONATIONS_SITE_PASSWORD: ${{ github.event.inputs.site_password || secrets.MATRIX_DONATIONS_SITE_PASSWORD }}
        run: npm run test:e2e

      - name: Skip notice
        if: ${{ github.event.inputs.base_url == '' && secrets.MATRIX_DONATIONS_BASE_URL == '' }}
        run: |
          echo "MATRIX_DONATIONS_BASE_URL is not configured."
          echo "Set repository secret MATRIX_DONATIONS_BASE_URL or pass workflow_dispatch base_url input."
